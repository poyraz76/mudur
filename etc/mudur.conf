# ==============================================================================

[system]
# Sistem dili ve klavye haritası
# Müdür, bu değerleri SQLite inventory.db içine 'config' tablosuna mühürler.
language = "tr"
keymap = "trq"
tty_number = 6

[hardware]
# Donanım saati ayarları
# UTC: Greenwich, local: Yerel saat
clock = "local"
clock_adjust = false

# Virtualization / Sanallaştırma
# LXC guest olarak çalışıyorsa true yapın.
lxc_guest = false

[boot]
# Öncelikle başlatılacak servis (Head Start)
# Müdür, bu servisi ve bağımlılıklarını asenkron TaskGroup ile en öne alır.
head_start = "xdm"

# Oto-driver katmanı
# x86_64 donanım taraması ve modül yükleme aktifliği.
auto_driver = true

[security]
# Bütünlük kontrolü için kullanılacak birincil hash algoritması.
primary_hash = "BLAKE3"
# Arşivleme ve MTREE manifest yapısı için sıkıştırma tipi.
archive_format = "zstd"

[logging]
# Loglama için Zstd sıkıştırma aktifliği.
compress_logs = true
log_path = "/var/log/mudur.log.zst"
